<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Zeta Attribution — Identity Fabric Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
:root {
  --bg-page: #f5f6f8;
  --bg-card: #ffffff;
  --bg-sidebar: #0f1525;
  --bg-elevated: #f8fafc;
  --bg-code: #0f172a;
  --text-primary: #1f2937;
  --text-secondary: #6b7280;
  --text-tertiary: #9ca3af;
  --text-inverse: #f3f4f6;
  --text-code: #e2e8f0;
  --border: #e5e7eb;
  --border-strong: #d1d5db;
  --accent: #2563eb;
  --accent-strong: #1d4ed8;
  --accent-soft: #dbeafe;
  --success: #059669;
  --success-soft: #d1fae5;
  --warning: #d97706;
  --warning-soft: #fef3c7;
  --danger: #dc2626;
  --danger-soft: #fee2e2;
  --info: #0284c7;
  --info-soft: #e0f2fe;
  --pill-bg: #f3f4f6;

  --c-programmatic: #f59e0b;
  --c-display: #f59e0b;
  --c-ctv: #8b5cf6;
  --c-email: #3b82f6;
  --c-inbox: #14b8a6;
  --c-web: #dc2626;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg-page); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif; font-size: 14px; line-height: 1.45; }

/* main — single centered column optimized for ~800px */
.main {
  width: 100%; max-width: 760px; margin: 0 auto;
  padding: 20px 20px 56px; min-width: 0;
  /* Prevent absolutely-positioned descendants (notably the 300px-wide
     .info-icon::after tooltip near the right edge) from creating a
     horizontal page scroll inside narrow embeds. */
  overflow-x: clip;
}
.topbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.topbar h1 { font-size: 22px; font-weight: 700; margin: 0; }
.topbar .meta { color: var(--text-secondary); }
.spacer { flex: 1; }
.btn { background: var(--accent); color: white; border: 0; padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn:hover { background: var(--accent-strong); }
.btn.secondary { background: white; color: var(--text-primary); border: 1px solid var(--border-strong); }
.btn.secondary:hover { background: var(--bg-elevated); }

/* pills */
.pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px; background: var(--pill-bg); color: var(--text-primary); font-size: 12px; font-weight: 500; border: 1px solid var(--border); cursor: default; }
.pill.clickable { cursor: pointer; }
.pill.clickable:hover { background: white; }
.pill.active { background: var(--accent-soft); color: var(--accent-strong); border-color: #bfdbfe; }
.pill.tone-info { background: var(--info-soft); color: var(--info); border-color: #bae6fd; }
.pill.tone-success { background: var(--success-soft); color: var(--success); border-color: #a7f3d0; }
.pill.tone-warning { background: var(--warning-soft); color: var(--warning); border-color: #fde68a; }
.pill.tone-danger { background: var(--danger-soft); color: var(--danger); border-color: #fecaca; }
.pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.7; }

/* cards */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; }
.card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; }
.card-header .right { margin-left: auto; }
.card-body { padding: 16px; }
.card-body.tight { padding: 12px; }
.card-body.flush { padding: 0; }

/* layouts — at the compact ~760px width (Confluence iframe) we keep two-column where it
   works (cols-2 and the labeled grids) and let stat strips (cols-3 through cols-6) wrap
   on their own via auto-fit. The wide-mode media query below grows .main; auto-fit + 1fr
   then stretches the cards into the extra space without needing per-grid overrides. */
.grid { display: grid; gap: 12px; }
.grid > * { min-width: 0; }
.grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid.cols-3 { grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); }
.grid.cols-4 { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
/* cols-5 and cols-6 are sized to fit on a single row inside the 720px-usable
   .main container (760px max-width minus 20px padding each side). 5×128 + 4×12 = 688px;
   6×105 + 5×12 = 690px. Both stay under 720px so all cards land in one row. */
.grid.cols-5 { grid-template-columns: repeat(auto-fit, minmax(128px, 1fr)); }
.grid.cols-6 { grid-template-columns: repeat(auto-fit, minmax(105px, 1fr)); }
.grid.mta    { grid-template-columns: minmax(0, 3fr) minmax(0, 4fr); }
.grid.aud-wf { grid-template-columns: minmax(0, 3fr) minmax(0, 2fr); }
.grid.inc    { grid-template-columns: minmax(0, 2fr) minmax(0, 3fr); }
.grid.queries{ grid-template-columns: minmax(0, 1fr) minmax(0, 2fr); }

/* below ~720px (the labeled two-column grids get cramped), collapse them to single column */
@media (max-width: 720px) {
  .grid.mta, .grid.aud-wf, .grid.inc, .grid.queries { grid-template-columns: 1fr; }
  .grid.cols-2 { grid-template-columns: 1fr; }
}
.row { display: flex; align-items: center; gap: 8px; }
.row.wrap { flex-wrap: wrap; }
.col { display: flex; flex-direction: column; gap: 8px; }
.section { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }

/* KPI stats */
.stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
.stat .v { font-size: 22px; font-weight: 700; color: var(--text-primary); line-height: 1.2; font-variant-numeric: tabular-nums; }
.stat .v.tone-success { color: var(--success); }
.stat .v.tone-warning { color: var(--warning); }
.stat .l { font-size: 11px; color: var(--text-secondary); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
/* Scoped overrides for narrow grids — tighten padding and shrink the value font
   just enough that the largest displayed number ("14,213,926") fits without
   horizontal overflow. cols-6 cards are ~117px wide at 800px viewport so they
   need more aggressive trimming than cols-5 (~142px). */
.grid.cols-5 .stat { padding: 12px 12px; }
.grid.cols-5 .stat .v { font-size: 20px; }
.grid.cols-6 .stat { padding: 12px 10px; }
.grid.cols-6 .stat .v { font-size: 18px; }

/* Responsive: when viewport has room beyond the Confluence-iframe target,
   grow .main back toward a comfortable desktop width. Single jump at 900px
   keeps the iframe (≤760px viewport) pinned to its compact layout while
   any desktop browser session opens up to a more presentable 1100px. */
@media (min-width: 900px) {
  .main { max-width: 1100px; padding: 28px 28px 64px; }
}
/* Once the cards have enough inner width to comfortably fit the largest
   stat value ("14,213,926") at full 22px, release the scoped tight
   overrides so KPI/diagnostic strips read at their original visual weight. */
@media (min-width: 1100px) {
  .grid.cols-5 .stat,    .grid.cols-6 .stat    { padding: 14px 16px; }
  .grid.cols-5 .stat .v, .grid.cols-6 .stat .v { font-size: 22px; }
}

/* callout */
.callout { padding: 14px 16px; border-radius: 8px; border: 1px solid var(--border); background: white; }
.callout .title { font-weight: 600; margin-bottom: 4px; }
.callout.info    { background: var(--info-soft);    border-color: #bae6fd; }
.callout.info .title    { color: var(--info); }
.callout.success { background: var(--success-soft); border-color: #a7f3d0; }
.callout.success .title { color: var(--success); }
.callout.warning { background: var(--warning-soft); border-color: #fde68a; }
.callout.warning .title { color: var(--warning); }

/* tables */
.tbl-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 6px; background: white; }
table.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th, .tbl td { padding: 8px 10px; text-align: left; vertical-align: top; border-bottom: 1px solid var(--border); }
.tbl thead th { background: var(--bg-elevated); color: var(--text-secondary); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
.tbl tbody tr:last-child td { border-bottom: 0; }
.tbl tbody tr.row-success { background: rgba(5, 150, 105, 0.06); }
.tbl tbody tr.row-warning { background: rgba(217, 119, 6, 0.06); }
.tbl tbody tr.row-danger  { background: rgba(220, 38, 38, 0.05); }
.tbl .num { text-align: right; font-variant-numeric: tabular-nums; }
.tbl code { background: var(--bg-elevated); padding: 1px 5px; border-radius: 3px; font-size: 11px; }

/* text helpers */
.t-sec { color: var(--text-secondary); }
.t-ter { color: var(--text-tertiary); }
.t-small { font-size: 12px; }
.t-mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
.t-bold { font-weight: 700; }
.t-semi { font-weight: 600; }

/* select */
select { font-family: inherit; font-size: 13px; padding: 6px 10px; border: 1px solid var(--border-strong); border-radius: 6px; background: white; min-width: 220px; }

/* code block */
pre.sql { margin: 0; padding: 14px; background: var(--bg-code); color: var(--text-code); border-radius: 6px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; line-height: 1.55; overflow-x: auto; }

/* collapsible */
.collapse-head { cursor: pointer; user-select: none; }
.chev { display: inline-block; transition: transform 0.15s ease; margin-right: 4px; color: var(--text-tertiary); }
.chev.open { transform: rotate(90deg); }

/* waterfall editor */
.wf-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px dashed var(--border); }
.wf-row:last-child { border-bottom: 0; }
.wf-index { background: var(--pill-bg); width: 22px; height: 22px; display: grid; place-items: center; border-radius: 6px; font-size: 11px; font-weight: 600; color: var(--text-secondary); }
.icon-btn { background: none; border: 1px solid var(--border-strong); width: 24px; height: 24px; border-radius: 6px; cursor: pointer; color: var(--text-secondary); display: inline-grid; place-items: center; }
.icon-btn:hover { background: var(--bg-elevated); }
.icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* charts */
.chart-frame { position: relative; width: 100%; }
.chart-frame canvas { display: block !important; box-sizing: border-box; }

/* tabs */
.tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }

/* info icon + tooltip */
.info-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 15px; height: 15px; border-radius: 999px;
  background: var(--pill-bg); color: var(--text-secondary);
  font-size: 10px; font-weight: 700; font-family: Georgia, serif;
  cursor: help; position: relative; margin-left: 6px;
  border: 1px solid var(--border);
}
.info-icon:hover { background: var(--accent-soft); color: var(--accent-strong); border-color: #bfdbfe; }
.info-icon::after {
  content: attr(data-tip);
  position: absolute; top: 22px; left: -8px;
  width: 300px;
  padding: 10px 12px;
  background: #1f2937; color: white;
  font-size: 12px; font-weight: 400; font-family: -apple-system, system-ui, sans-serif;
  line-height: 1.5; border-radius: 6px;
  opacity: 0; visibility: hidden;
  transition: opacity 0.12s ease;
  z-index: 9999;
  text-align: left; white-space: normal;
  pointer-events: none;
}
.info-icon::before {
  content: ""; position: absolute; top: 16px; left: 0;
  border: 6px solid transparent; border-bottom-color: #1f2937;
  opacity: 0; transition: opacity 0.12s ease;
}
.info-icon:hover::after, .info-icon:hover::before { opacity: 1; visibility: visible; }
.info-icon.right::after { left: auto; right: -8px; }
.info-icon.right::before { left: auto; right: 0; }

</style>
</head>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useRef, useEffect, useContext } = React;

// Broadcast channel for the top-bar "Expand all" / "Collapse all" pills. Each click
// publishes a fresh {open, key} object; collapsible components subscribe via useContext
// and apply the new open state when key changes. Individual sections retain their own
// open state at all other times, so per-section toggling continues to work unaffected.
const CollapseBroadcastContext = React.createContext(null);

// ============================================================================
// SAMPLE DATA (mirrors the canvas + the two design docs)
// ============================================================================

const ACCOUNT = "Zeta Luxury Hotel Collection";
const CAMPAIGN = {
  id: "cmp_spring2026_awareness",
  name: "Spring 2026 Awareness Push",
  window: "May 10 – Jun 5, 2026 (27 days)",
  attribution_window_days: 30,
};

const ID_TYPE_LABEL = {
  em_md5: "Email (MD5)",
  em_sha256: "Email (SHA-256)",
  ph: "Phone",
  pa: "Postal (hashed)",
  cb: "BSIN (customer ID)",
  np: "NPI (healthcare)",
  cs: "Sizmek cookie",
  cz: "Zync cookie",
  cd: "Disqus cookie",
  mm: "MAID",
  zz: "Zeta ID",
  ip: "IP address",
  ctv: "CTV device ID",
};

const DEFAULT_WATERFALL = ["em_md5", "em_sha256", "pa", "ph", "cb"];

const AUDIENCES = [
  { id: "aud_past_guests_loyalty",    name: "Past Guests Loyalty List",       source: "Customer uploaded · postal-keyed",                                size: "2.3M",      lineage_present: true,  waterfall_config_id: "wf_account_default_v3" },
  { id: "aud_high_intent_travelers",  name: "High-Intent Travelers",          source: "Zeta-native prospect",                                            size: "18.0M",     lineage_present: false, waterfall_config_id: "wf_account_default_v3" },
  { id: "aud_ctv_lookalike",          name: "CTV Lookalike",                  source: "Partner (ZX)",                                                    size: "4.1M",      lineage_present: false, waterfall_config_id: "wf_account_default_v3" },
  // ZX decile-randomization sub-audiences (2 of 22 shown — the rest collapsed into the summary row)
  { id: "aud_zx_d10_trt",             name: "ZX High-Value Travel · D10 TRT", source: "ZX propensity model v8 · decile 10 · treatment arm",              size: "1.28M",     lineage_present: false, waterfall_config_id: "wf_zx_native_v2" },
  { id: "aud_zx_d10_ctl",             name: "ZX High-Value Travel · D10 CTL", source: "ZX propensity model v8 · decile 10 · ghost control",              size: "0.14M",     lineage_present: false, waterfall_config_id: "wf_zx_native_v2" },
  { id: "aud_zx_more",                name: "+20 more ZX decile audiences",   source: "Deciles 9–1 + U, each split into TRT/CTL (deciles-as-audiences)", size: "5.7M total",lineage_present: false, waterfall_config_id: "wf_zx_native_v2" },
];

const AUDIENCE_LINEAGE = [
  { lineage_id: "lin_001", audience_id: "aud_past_guests_loyalty", customer_supplied_id: "pa/9c4f…a31", customer_id_type: "pa", mapping_path: ["pa→em_md5", "em_md5→zid"], resolved_zids: ["zid_88102","zid_88103"], graph_snapshot_version: "sg_2026-05-12" },
  { lineage_id: "lin_002", audience_id: "aud_past_guests_loyalty", customer_supplied_id: "pa/1b27…8df", customer_id_type: "pa", mapping_path: ["pa→em_md5", "em_md5→zid"], resolved_zids: ["zid_88207"],            graph_snapshot_version: "sg_2026-05-12" },
  { lineage_id: "lin_003", audience_id: "aud_past_guests_loyalty", customer_supplied_id: "pa/7e51…c02", customer_id_type: "pa", mapping_path: ["pa→em_md5", "em_md5→zid"], resolved_zids: ["zid_88341","zid_88342","zid_88343"], graph_snapshot_version: "sg_2026-05-12" },
  { lineage_id: "lin_004", audience_id: "aud_past_guests_loyalty", customer_supplied_id: "pa/4a8c…b19", customer_id_type: "pa", mapping_path: ["pa→em_md5", "em_md5→zid"], resolved_zids: ["zid_88450"],            graph_snapshot_version: "sg_2026-05-12" },
  { lineage_id: "lin_005", audience_id: "aud_past_guests_loyalty", customer_supplied_id: "pa/3d92…fff", customer_id_type: "pa", mapping_path: ["pa→em_md5", "em_md5→zid"], resolved_zids: ["zid_88500"],            graph_snapshot_version: "sg_2026-05-12" },
];

// Identity events: emitted by People Service (inside ZMP) and ingested into EEL like any other event.
// Each row carries the BSIN, the identifier that was attached/removed, the mutation subtype,
// and the ZIDs the identifier resolved to at write time. The SCD2 "what ZIDs did this BSIN
// have at time T?" view is a derived projection of this stream.
const IDENTITY_EVENTS = [
  { event_id: "id_001", event_subtype: "bsin_created",         event_time: "2026-04-01T08:00:00Z", bsin: "bsin_001847", identifier: { type: "em_md5", value: "em_md5_xyz…001" }, resolved_zids: ["zid_88102"],                                       waterfall_config_id: "wf_account_default_v3" },
  { event_id: "id_002", event_subtype: "identifier_attached", event_time: "2026-04-03T12:14:00Z", bsin: "bsin_001847", identifier: { type: "cs",     value: "cs_abc…001" },     resolved_zids: ["zid_88103"],                                       waterfall_config_id: "wf_account_default_v3" },
  { event_id: "id_003", event_subtype: "bsin_created",         event_time: "2026-04-01T08:00:00Z", bsin: "bsin_001904", identifier: { type: "em_md5", value: "em_md5_aaa…044" }, resolved_zids: ["zid_88207"],                                       waterfall_config_id: "wf_account_default_v3" },
  { event_id: "id_004", event_subtype: "bsin_created",         event_time: "2026-04-01T08:00:00Z", bsin: "bsin_002311", identifier: { type: "cs",     value: "cs_abc…017" },     resolved_zids: ["zid_88341"],                                       waterfall_config_id: "wf_account_default_v3" },
  { event_id: "id_005", event_subtype: "identifier_attached", event_time: "2026-05-14T03:00:00Z", bsin: "bsin_002311", identifier: { type: "cs",     value: "cs_abc…017" },     resolved_zids: ["zid_88341","zid_88342","zid_88343"],               waterfall_config_id: "wf_account_default_v3" },
  { event_id: "id_006", event_subtype: "bsin_created",         event_time: "2026-04-01T08:00:00Z", bsin: "bsin_002405", identifier: { type: "em_md5", value: "em_md5_qqq…405" }, resolved_zids: ["zid_88450"],                                       waterfall_config_id: "wf_account_default_v3" },
  { event_id: "id_007", event_subtype: "identifier_removed",  event_time: "2026-05-22T18:30:00Z", bsin: "bsin_002405", identifier: { type: "ph",     value: "ph/+1-555…7788" }, resolved_zids: ["zid_88451"],                                       waterfall_config_id: "wf_account_default_v3" },
];

// SuperGraph Transition Logs — schema matches production's aggregated ZidTransitionMapping
// (see Confluence "ZID Transition Mapping (aggregated)"). Three fields:
//   zid         : the stale ZID (the lookup key)
//   currentZid  : the current ZID after collapsing every downstream transition through to its end state
//   staleDate   : the day `zid` first went stale; set once, never refreshed even when later
//                 transitions update currentZid (so older stale entries keep their original date)
// Chains are collapsed at write time: if A→B existed and today B→C, the table stores BOTH
// (A, C, staleDateOfA) and (B, C, staleDateOfB). Consumers always get the final answer in one
// hop — no recursive walk required. Rows have a finite TTL (drop after N days outside the
// business window).
const TRANSITION_LOGS = [
  // Direct transition: cluster_merge happened on 2026-05-14, zid_88341 collapsed into zid_88342.
  { zid: "zid_88341",            currentZid: "zid_88342", staleDate: "2026-05-14" },
  // Chain-collapsed transition: zid_88100 originally went stale on 2026-04-15 when it merged
  // into zid_88341. zid_88341 has since collapsed into zid_88342, so this row's currentZid
  // was rewritten to zid_88342 — but staleDate is preserved as 2026-04-15.
  { zid: "zid_88100",            currentZid: "zid_88342", staleDate: "2026-04-15" },
  // Placeholder promotion: cz_9a1…d44 was originally written with a placeholder ZID;
  // on 2026-05-28 SuperGraph promoted it to a real ZID, marking the placeholder stale.
  { zid: "zid_PLACEHOLDER_001",  currentZid: "zid_88450", staleDate: "2026-05-28" },
];

// EEL exposures: impressions only (incl. ghost_impression for incrementality). propensity_score / propensity_model_id populated only for ZX-style stratified events.
// lineage_enrichment is stamped by EEL at ingest time by reading from Lineage Logs for any exposure whose audience has lineage_present:true; null otherwise.

    sql: `-- Pseudocode: for each conversion, for each touchpoint t in matched set,
-- credit_share = MODEL(t, all_touchpoints, conv_time)
-- e.g. last_touch  -> 1.0 to MAX(exp_time)
--      first_touch -> 1.0 to MIN(exp_time)
--      linear      -> 1/N
--      time_decay  -> exp(-lambda * (conv_time - exp_time))   normalized
--      position    -> 0.4 first, 0.4 last, 0.2 split middle
SELECT exp_zid, channel, audience_id,
       SUM(conversion_value * credit_share) AS credited_value,
       SUM(credit_share)                    AS credited_count
FROM matched_touchpoints
GROUP BY exp_zid, channel, audience_id;` },
  { name: "6. Project per-ZID credit → BSIN (via EEL identity events)",
    description: "Identity events from People Service are ingested into EEL like any other event. Build an as-of-time view of (bsin → resolved_zids) by taking the latest identity event per (bsin, identifier) up to the conversion timestamp, then join per-ZID credit against it. Replaces the separate ZMP-profile-lineage SCD2 store.",
    sql: `WITH latest_id_event AS (
  SELECT
    bsin,
    identifier_type,
    identifier_value,
    resolved_zids,
    event_subtype,
    ROW_NUMBER() OVER (
      PARTITION BY bsin, identifier_type, identifier_value
      ORDER BY event_time DESC
    ) AS rn
  FROM eel.events
  WHERE event_type  = 'identity'
    AND account_id  = :account_id
    AND event_time <= :as_of_time
), bsin_as_of AS (
  SELECT bsin,
         ARRAY_AGG(DISTINCT z.value::string) AS bsin_zids
  FROM latest_id_event,
       LATERAL FLATTEN(input => resolved_zids) z
  WHERE rn = 1
    AND event_subtype IN ('identifier_attached','bsin_created','bsin_merge')
  GROUP BY bsin
)
SELECT b.bsin,
       SUM(c.credited_count) AS credited_count,
       SUM(c.credited_value) AS credited_value
FROM per_zid_credit c
JOIN bsin_as_of    b
  ON ARRAYS_OVERLAP(ARRAY_CONSTRUCT(c.exp_zid), b.bsin_zids)
GROUP BY b.bsin;` },
  { name: "7. Project per-ZID credit → customer_supplied_id (no lineage join)",
    description: "Lineage is already stamped onto each exposure row at EEL ingest time, so the attribution engine reads it directly. The audience_lineage table doesn't appear in this query at all — exposures missing enrichment are simply the rows that fall through to ZID-only reporting.",
    sql: `SELECT
  e.lineage_enrichment:original_identifier::string      AS customer_supplied_id,
  e.lineage_enrichment:original_identifier_type::string AS customer_id_type,
  SUM(c.credited_count) AS credited_count,
  SUM(c.credited_value) AS credited_value
FROM per_zid_credit       c
JOIN eel.exposure_events  e  ON e.event_id = c.exposure_event_id
WHERE e.lineage_enrichment IS NOT NULL
GROUP BY 1, 2;` },
  { name: "8. Household projection (dynamic, from observed identifiers)",
    description: "Group ZIDs that share any selected household identifier value (IP / CTV / postal) within the window.",
    sql: `WITH hh_ids AS (
  SELECT DISTINCT
    f.value:zid::string AS zid,
    g.value:type::string  AS hh_type,
    g.value:value::string AS hh_value
  FROM eel.events,
       LATERAL FLATTEN(input => resolved_zids)         f,
       LATERAL FLATTEN(input => original_identifiers)  g
  WHERE account_id = :account_id
    AND event_time BETWEEN :win_start AND :win_end
    AND g.value:type::string IN (:household_id_types)
), edges AS (
  SELECT a.zid AS zid_a, b.zid AS zid_b
  FROM hh_ids a JOIN hh_ids b USING (hh_type, hh_value)
  WHERE a.zid < b.zid
)
-- compute connected components -> household_id
-- then SUM per_zid_credit grouped by household_id` },
  { name: "9. Incrementality — lift by arm and channel",
    description: "Discard contaminated members (in both arms), then compute treatment − control by channel.",
    sql: `WITH arm_members AS (
  SELECT DISTINCT exp_zid AS zid, exposure_arm, experiment_id
  FROM matched_touchpoints
), contam AS (
  SELECT zid
  FROM arm_members
  GROUP BY zid, experiment_id
  HAVING COUNT(DISTINCT exposure_arm) > 1
), clean AS (
  SELECT * FROM arm_members WHERE zid NOT IN (SELECT zid FROM contam)
)
SELECT channel, exposure_arm,
       COUNT(DISTINCT zid)                                AS population,
       SUM(CASE WHEN converted THEN 1 ELSE 0 END)         AS converters,
       SAFE_DIVIDE(SUM(CASE WHEN converted THEN 1 ELSE 0 END),
                   COUNT(DISTINCT zid))                   AS conv_rate
FROM clean LEFT JOIN conversions USING (zid)
GROUP BY channel, exposure_arm;` },
  { name: "10. Per-stratum lift (deciles-as-audiences)",
    description: "Stratified incrementality. Each (decile × arm) audience is its own audience_id; per-decile lift falls out of grouping the standard arm rates by audience_id.",
    sql: `WITH arm_rates AS (
  SELECT
    e.audience_id,
    e.exposure_arm,
    COUNT(DISTINCT z.value:zid::string)                                          AS population,
    SUM(CASE WHEN converted THEN 1 ELSE 0 END)                                   AS converters,
    SAFE_DIVIDE(SUM(CASE WHEN converted THEN 1 ELSE 0 END),
                COUNT(DISTINCT z.value:zid::string))                             AS conv_rate
  FROM eel.exposure_events e,
       LATERAL FLATTEN(input => e.resolved_zids) z
  LEFT JOIN conversions c
         ON c.zid = z.value:zid::string
        AND c.event_time BETWEEN e.event_time
                             AND DATEADD(day, :attribution_window_days, e.event_time)
  WHERE e.campaign_id   = :campaign_id
    AND e.experiment_id = :experiment_id
  GROUP BY e.audience_id, e.exposure_arm
)
SELECT
  REGEXP_SUBSTR(a_trt.audience_id, 'd[0-9]+|u', 1, 1, 'i') AS decile,
  a_trt.population AS trt_pop, a_ctl.population AS ctl_pop,
  a_trt.conv_rate  AS trt_rate, a_ctl.conv_rate  AS ctl_rate,
  SAFE_DIVIDE(a_trt.conv_rate - a_ctl.conv_rate, a_ctl.conv_rate) AS lift_vs_ghost
FROM arm_rates a_trt
JOIN arm_rates a_ctl
  ON REPLACE(a_trt.audience_id, '_trt', '_ctl') = a_ctl.audience_id
 AND a_trt.exposure_arm = 'served'
 AND a_ctl.exposure_arm = 'ghost'
ORDER BY decile DESC;` },
  { name: "11. Per-stratum propensity-score homogeneity (TRT vs CTL)",
    description: "Validates that randomization within each decile produced balanced TRT and CTL groups on the propensity score — the textbook proof for any stratified design.",
    sql: `SELECT
  e.audience_id,
  e.exposure_arm,
  COUNT(*)                                                                AS n,
  MIN(e.propensity_score)                                                 AS min_score,
  PERCENTILE_CONT(0.25) WITHIN GROUP (ORDER BY e.propensity_score)        AS p25,
  PERCENTILE_CONT(0.50) WITHIN GROUP (ORDER BY e.propensity_score)        AS median,
  PERCENTILE_CONT(0.75) WITHIN GROUP (ORDER BY e.propensity_score)        AS p75,
  MAX(e.propensity_score)                                                 AS max_score
FROM eel.exposure_events e
WHERE e.account_id        = :account_id
  AND e.experiment_id     = :experiment_id
  AND e.propensity_model_id = :propensity_model_id
GROUP BY e.audience_id, e.exposure_arm;
-- pivot TRT vs CTL per decile and compute
--   abs_pct_diff = |TRT.median - CTL.median| / ((TRT.median + CTL.median) / 2) * 100
-- flag any decile where abs_pct_diff > 0.20%` },
];

// FORMAT HELPERS
// ============================================================================
const fmtInt = (n) => n.toLocaleString("en-US");
const fmtUsd = (n) => n.toLocaleString("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 });
const fmtPct = (n, d=1) => `${(n*100).toFixed(d)}%`;
const fmtSignedPct = (n, d=1) => { const v = (n*100).toFixed(d); return n >= 0 ? `+${v}%` : `${v}%`; };

// ============================================================================
// CHART WRAPPER
// ============================================================================
function ChartView({ config, height = 240 }) {
  const wrapRef = useRef(null);
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const [width, setWidth] = useState(0);

  useEffect(() => {
    if (!wrapRef.current) return;
    const measure = () => {
      if (wrapRef.current) setWidth(wrapRef.current.clientWidth || 0);
    };
    measure();
    let obs;
    if (typeof ResizeObserver !== "undefined") {
      obs = new ResizeObserver(measure);
      obs.observe(wrapRef.current);
    } else {
      window.addEventListener("resize", measure);
    }
    return () => {
      if (obs) obs.disconnect();
      else window.removeEventListener("resize", measure);
    };
  }, []);

  useEffect(() => {
    if (!canvasRef.current || !window.ChartJS || width === 0) return;
    if (chartRef.current) {
      try { chartRef.current.destroy(); } catch (e) {}
      chartRef.current = null;
    }
    try {
      const merged = {
        ...config,
        options: {
          ...(config.options || {}),
          responsive: false,
          maintainAspectRatio: false,
        },
      };
      chartRef.current = new window.ChartJS(canvasRef.current, merged);
    } catch (err) {
      console.error("Chart.js render error:", err);
    }
    return () => {
      if (chartRef.current) {
        try { chartRef.current.destroy(); } catch (e) {}
        chartRef.current = null;
      }
    };
  }, [JSON.stringify(config), width, height]);

  return (
    <div ref={wrapRef} className="chart-frame" style={{ height }}>
      <canvas ref={canvasRef} width={width} height={height} style={{ width: "100%", height: "100%", display: "block" }} />
    </div>
  );
}

// ============================================================================
// REUSABLE BITS
// ============================================================================
function Pill({ children, active, tone, clickable, onClick }) {
  const cls = ["pill", active && "active", tone && `tone-${tone}`, (clickable || onClick) && "clickable"].filter(Boolean).join(" ");
  return <span className={cls} onClick={onClick}>{children}</span>;
}
function InfoIcon({ tip, align }) {
  return <span className={`info-icon${align === "right" ? " right" : ""}`} data-tip={tip}>i</span>;
}
function Stat({ value, label, tone, tip }) {
  return (
    <div className="stat">
      <div className={`v ${tone ? `tone-${tone}` : ""}`}>{value}</div>
      <div className="l">{label}{tip && <InfoIcon tip={tip} />}</div>
    </div>
  );
}
function Callout({ kind, title, children }) {
  return <div className={`callout ${kind || ""}`}><div className="title">{title}</div><div>{children}</div></div>;
}
function Card({ title, info, right, children, flush }) {
  return (
    <div className="card">
      {title && (
        <div className="card-header">
          {title}{info && <InfoIcon tip={info} />}
          {right && <span className="right">{right}</span>}
        </div>
      )}
      <div className={`card-body${flush ? " flush" : ""}`}>{children}</div>
    </div>
  );
}
function CollapsibleCard({ title, right, defaultOpen = false, children }) {
  const [open, setOpen] = useState(defaultOpen);
  const broadcast = useContext(CollapseBroadcastContext);
  useEffect(() => { if (broadcast) setOpen(broadcast.open); }, [broadcast?.key]);
  return (
    <div className="card">
      <div className="card-header collapse-head" onClick={() => setOpen(o => !o)}>
        <span className={`chev ${open ? "open" : ""}`}>▶</span>{title}
        {right && <span className="right">{right}</span>}
      </div>
      {open && <div className="card-body">{children}</div>}
    </div>
  );
}
function CollapsibleSection({ title, info, badges, meta, defaultOpen = false, children }) {
  const [open, setOpen] = useState(defaultOpen);
  const broadcast = useContext(CollapseBroadcastContext);
  useEffect(() => { if (broadcast) setOpen(broadcast.open); }, [broadcast?.key]);
  return (
    <div className="section">
      <div className="row collapse-head" onClick={() => setOpen(o => !o)} style={{ cursor: "pointer", userSelect: "none" }}>
        <span className={`chev ${open ? "open" : ""}`}>▶</span>
        <h2 style={{ margin: 0, fontSize: 16 }}>{title}{info && <InfoIcon tip={info} />}</h2>
        {badges}
        {meta && <><div className="spacer"></div><span className="t-small t-sec">{meta}</span></>}
      </div>
      {open && <div className="col" style={{ gap: 12, marginTop: 12 }}>{children}</div>}
    </div>
  );
}
function Tbl({ headers, rows, columnAlign, rowTone }) {
  return (
    <div className="tbl-wrap">
      <table className="tbl">
        <thead>
          <tr>{headers.map((h,i) => <th key={i} className={(columnAlign||[])[i] === "right" ? "num" : ""}>{h}</th>)}</tr>
        </thead>
        <tbody>
          {rows.map((r,i) => (
            <tr key={i} className={(rowTone||[])[i] ? `row-${(rowTone||[])[i]}` : ""}>
              {r.map((c,j) => <td key={j} className={(columnAlign||[])[j] === "right" ? "num" : ""}>{c}</td>)}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function IncrementalitySection({ channelData }) {
  const totalInc = channelData.reduce((s, c) => s + c.incremental, 0);
  const psa     = ARMS.find(a => a.id === "psa");
  const holdout = ARMS.find(a => a.id === "holdout");
  const liftVsPsa     = (SERVED_RATE - psa.conv_rate) / psa.conv_rate;
  const liftVsHoldout = (SERVED_RATE - holdout.conv_rate) / holdout.conv_rate;

  const armConfig = {
    type: "bar",
    data: {
      labels: ARMS.map(a => a.label),
      datasets: [{
        label: "Conversion rate",
        data: ARMS.map(a => +(a.conv_rate * 100).toFixed(3)),
        backgroundColor: ARMS.map(a => a.color),
        borderRadius: 3,
      }],
    },
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `${ctx.parsed.y.toFixed(3)}%` } } },
      scales: {

  const incByChannelConfig = {
    type: "bar",
    data: {
      labels: channelData.map(c => c.name),

  const ARM_TIPS = {
    served:  "Users who saw the ad or received the message. The treatment group — real campaign creative was delivered to them.",
    ghost:   "Users who were eligible and selected into the activation, then suppressed at the last moment so nothing was delivered. Covers both the DSP case (auction ran, no ad shown) and the email/CRM case (recipient was selected, no message was sent). The cleanest control because the only difference vs treatment is whether the impression itself happened — most ZX-style decile-randomization tests use this arm.",
    psa:     "Users who were eligible but had the campaign ad replaced with a public-service announcement in the same slot. An 'active' control that holds creative delivery constant so the comparison isolates the effect of this specific message vs any message.",
    holdout: "Users in the eligible audience who were deliberately excluded from the campaign before activation — never even considered for delivery. Useful when there's no per-impression selection signal to attach a ghost record to, but noisier than ghost because holdout users may differ from treated users systematically.",
  };

  return (
    <CollapsibleSection
      title="Incrementality"
      info="Causal measurement that compares the conversion rate of users who saw the ad (served) against matched users who didn't (ghost / PSA / holdout). Lift is what the campaign actually caused — separate from what the MTA model credits to it. The aggregate numbers shown here are the population-weighted total of the per-decile breakdown in the Stratified test design section below."

      </Card>
      <div className="grid inc">
        <Card
          title="Conversion rate by arm"
          info="Raw conversion rate of each experiment arm. Differences between bars are the basis of all lift calculations — bigger gaps between served and the controls mean larger causal lift."

            <ChartView config={armConfig} height={240} />
            <div className="row wrap" style={{ gap: 16 }}>
              <Stat value={fmtSignedPct(INCREMENTAL_LIFT)} label="Lift vs ghost (canonical)" tone="success" tip="Served conversion rate divided by ghost conversion rate, minus 1. This is the canonical incrementality number because ghost is the cleanest control — same eligibility as served, just no ad shown." />
              <Stat value={fmtSignedPct(liftVsPsa)}        label="Lift vs PSA"     tip="Served conversion rate vs PSA. Smaller than lift-vs-ghost when any ad delivery boosts conversions on its own — the gap between this number and lift-vs-ghost is the 'message-specific' part of the campaign's effect." />
              <Stat value={fmtSignedPct(liftVsHoldout)}    label="Lift vs holdout" tip="Served conversion rate vs holdout. Usually the largest of the three because holdout users are systematically different from treated users, not just unexposed — use this as an upper bound, not a clean causal estimate." />
            </div>
            <div className="row wrap" style={{ gap: 16 }}>

        <Card

        ><ChartView config={incByChannelConfig} height={340} /></Card>
      </div>
    </CollapsibleSection>

}

// ============================================================================
// STRATIFIED TEST DESIGN (ZX-style propensity-decile)
// ============================================================================
function StratifiedDesignSection() {
  const liftConfig = {
    type: "bar",
    data: {
      labels: DECILES.map(d => `D${d.decile}`),
      datasets: [{
        label: "Lift vs ghost",
        data: DECILES.map(d => +(((d.trt_conv_rate - d.ctl_conv_rate) / d.ctl_conv_rate) * 100).toFixed(2)),
        backgroundColor: DECILES.map(d => d.p_value < 0.05 ? "#059669" : "#9ca3af"),
        borderRadius: 3,
      }],
    },
    options: {
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `Lift vs ghost: ${ctx.parsed.y.toFixed(2)}%` } },
      },
      scales: {
        y: { title: { display: true, text: "Lift vs ghost (%)" }, ticks: { callback: v => `${v}%` } },
        x: { title: { display: true, text: "Propensity decile (D10 = most likely to convert)" } },
      },
    },
  };

  const popConfig = {
    type: "bar",
    data: {
      labels: DECILES.map(d => `D${d.decile}`),
      datasets: [
        { label: "TRT", data: DECILES.map(d => d.trt_pop), backgroundColor: "#059669", borderRadius: 3, stack: "pop" },
        { label: "CTL", data: DECILES.map(d => d.ctl_pop), backgroundColor: "#0284c7", borderRadius: 3, stack: "pop" },
      ],
    },
    options: {
      maintainAspectRatio: false,
      plugins: {
        legend: { position: "top" },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${fmtInt(ctx.parsed.y)}` } },
      },
      scales: {
        x: { stacked: true },
        y: { stacked: true, title: { display: true, text: "Population" }, ticks: { callback: v => fmtInt(v) } },
      },
    },
  };

  const sig = (p) => p < 0.01 ? "p < 0.01" : p < 0.05 ? `p = ${p.toFixed(3)}` : `p = ${p.toFixed(3)} (n.s.)`;
  const sigTone = (p) => p < 0.05 ? undefined : "warning";
  const homogTone = (abs) => abs == null ? undefined : abs > 0.20 ? "warning" : undefined;

  return (
    <CollapsibleSection
      title="Stratified test design (propensity-decile)"
      info="ZX-style decile-randomization design. The campaign audience is force-ranked by a propensity model, bucketed into deciles (D10 = most likely to convert, D1 = least, U = unscored), and each decile is independently split into treatment and control. The aggregate lift above is the population-weighted combination of the per-decile lifts shown here."
      badges={<Pill tone="info">Detected · {STRATIFIED_DESIGN.propensity_model_id}</Pill>}
      meta={`${STRATIFIED_DESIGN.cadence} · ${STRATIFIED_DESIGN.significance_test}`}
    >
      <Callout kind="info">
        <span className="t-semi">{STRATIFIED_DESIGN.propensity_model_desc}.</span> Each (decile × arm) slice is registered as its own ZMP audience
        (e.g. <span className="t-mono">aud_zx_d10_trt</span>, <span className="t-mono">aud_zx_d10_ctl</span>) and rides existing audience-lineage plumbing — see Audiences below.
      </Callout>

      <div className="grid cols-4">
        <Stat value={fmtSignedPct(STRAT_AGG_LIFT)}    label="Population-weighted lift" tone="success" tip="Per-decile lifts weighted by decile TRT population. This should match the headline lift-vs-ghost number from the Incrementality section above (small drift is from rounding in the per-decile rates)." />
        <Stat value={fmtInt(Math.round(STRAT_AGG_INC_CONVS))} label="Incremental conversions"  tone="success" tip="Sum across deciles of (TRT rate − CTL rate) × TRT population. Falls cleanly out of the per-decile breakdown." />
        <Stat value={`${Math.round((STRAT_AGG_CTL_POP / (STRAT_AGG_TRT_POP + STRAT_AGG_CTL_POP)) * 100)}%`} label="Control share" tip="Share of the eligible population assigned to the control (ghost) arm. Held constant across all deciles to preserve per-stratum statistical power." />
        <Stat value={DECILES.filter(d => d.p_value < 0.05).length + ` of ${DECILES.length}`} label="Deciles with significant lift" tip="Per-decile Z-test at p < 0.05. Significance concentrates in the upper deciles where the propensity model is most predictive — the lower deciles are noisier but still contribute to the aggregate." />
      </div>

      <div className="grid inc">
        <Card
          title="Per-decile lift vs ghost"
          info="Lift bar per decile. Green = statistically significant at p < 0.05; grey = not significant. The descending pattern from D10 → D1 is the textbook propensity-decile signature — higher-propensity users convert more on their own (baseline conversion is high), so incremental lift compounds where the model says it should."
        ><ChartView config={liftConfig} height={280} /></Card>

        <Card
          title="Per-decile allocation (TRT + CTL populations)"
          info="Stacked population per decile. The allocation across deciles (20% from D10, 17% from D9, …) is set by the campaign designer; the same allocation applies to both TRT and CTL to keep the propensity mix balanced between arms."
        ><ChartView config={popConfig} height={280} /></Card>
      </div>

      <Card
        title="Per-decile breakdown"
        info="Per-decile populations, conversion rates, and Z-test p-values. The control share column shows the realized split (should be very close to the configured target — drift here means a selection bug). The p-value column tells you which decile-level lifts are statistically separable from zero."
        right={<Pill tone="success">contamination discarded · same attribution window per arm</Pill>}
      >
        <Tbl
          headers={["Decile", "Allocation", "TRT pop", "CTL pop", "% CTL", "TRT conv. rate", "CTL conv. rate", "Lift vs ghost", "Significance"]}
          columnAlign={["left","right","right","right","right","right","right","right","left"]}
          rowTone={DECILES.map(d => sigTone(d.p_value))}
          rows={DECILES.map(d => {
            const lift = (d.trt_conv_rate - d.ctl_conv_rate) / d.ctl_conv_rate;
            const pctCtl = d.ctl_pop / (d.trt_pop + d.ctl_pop);
            return [
              `D${d.decile}`,
              `${(d.allocation * 100).toFixed(0)}%`,
              fmtInt(d.trt_pop),
              fmtInt(d.ctl_pop),
              `${(pctCtl * 100).toFixed(1)}%`,
              fmtPct(d.trt_conv_rate, 3),
              fmtPct(d.ctl_conv_rate, 3),
              d.ctl_conv_rate === 0 ? "—" : fmtSignedPct(lift),
              sig(d.p_value),
            ];
          })}
        />
      </Card>

      <Card
        title="Per-decile propensity-score homogeneity (TRT vs CTL)"
        info="Median propensity score per arm per decile. Within each decile, TRT and CTL should be near-identical on the score — that's the proof that the randomization within strata was unbiased. Any abs % diff > 0.20% would warrant investigation; values under 0.05% are textbook clean."
        right={<Pill tone="info">randomization-balance proof</Pill>}
      >
        <Tbl
          headers={["Decile", "TRT median score", "CTL median score", "Abs % diff", "TRT avg freq", "CTL avg freq"]}
          columnAlign={["left","right","right","right","right","right"]}
          rowTone={DECILES.map(d => homogTone(d.score_abs_pct_diff))}
          rows={DECILES.map(d => [
            `D${d.decile}`,
            d.trt_med_score == null ? "—" : d.trt_med_score.toFixed(3),
            d.ctl_med_score == null ? "—" : d.ctl_med_score.toFixed(3),
            d.score_abs_pct_diff == null ? "— (unscored)" : `${d.score_abs_pct_diff.toFixed(2)}%`,
            d.trt_avg_freq.toFixed(1) + "×",
            d.ctl_avg_freq.toFixed(1) + "×",
          ])}
        />
      </Card>
    </CollapsibleSection>
  );
}

// ============================================================================
// MODEL vs CAUSALITY
// ============================================================================
function ModelVsCausality({ channelData }) {
  const totalCred = channelData.reduce((s, c) => s + c.credited, 0);
  const totalInc  = channelData.reduce((s, c) => s + c.incremental, 0);
  const rows = channelData.map(c => {
    const credShare = c.credited / totalCred;
    const incShare  = c.incremental / totalInc;
    const delta     = incShare - credShare;
    return { ...c, credShare, incShare, delta };
  });

  const cfg = {
    type: "bar",
    data: {
      labels: rows.map(r => r.name),
      datasets: [
        { label: "MTA share of credited",    data: rows.map(r => +(r.credShare * 100).toFixed(1)), backgroundColor: "#0284c7", borderRadius: 3 },
        { label: "Share of incremental",     data: rows.map(r => +(r.incShare * 100).toFixed(1)),  backgroundColor: "#059669", borderRadius: 3 },
      ],
    },
    options: {
      maintainAspectRatio: false,
      plugins: { legend: { position: "top" }, tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%` } } },
      scales: { y: { title: { display: true, text: "Share (%)" }, ticks: { callback: v => `${v}%` } } },
    },
  };

  const tone = (d) => d > 0.03 ? "success" : d < -0.03 ? "warning" : undefined;
  const interp = (d) => d > 0.03 ? "Under-credited by the model" : d < -0.03 ? "Over-credited — likely closing organic conversions" : "Aligned";

  return (
    <CollapsibleSection
      title="Credited vs. Incremental — by channel"
      info="Side-by-side comparison of each channel's share of MTA-credited conversions (what the model claims) vs share of incremental conversions (what was actually caused). Big positive deltas mean the channel is driving conversions the model under-credits; big negative deltas mean it's closing organic journeys."
    >
      <p className="t-sec" style={{ margin: 0 }}>
        Multi-touch credit and incrementality answer different questions. When they disagree, the channel is either
        closing journeys that would have converted anyway (over-credited) or driving conversions the model under-credits.
      </p>
      <Card
        title="Share of credit vs. share of incremental conversions"
        info="Each channel gets two bars: blue is its share of model-credited conversions, green is its share of conversions caused by the campaign per the experiment. When the bars are close, the model is well-calibrated for that channel; when they diverge, the model is either over- or under-claiming."
      ><ChartView config={cfg} height={320} /></Card>
      <Tbl
        headers={["Channel", "MTA share", "Incremental share", "Delta (inc − cred)", "Interpretation"]}
        columnAlign={["left","right","right","right","left"]}
        rowTone={rows.map(r => tone(r.delta))}
        rows={rows.map(r => [r.name, fmtPct(r.credShare), fmtPct(r.incShare), fmtSignedPct(r.delta), interp(r.delta)])}
      />
    </CollapsibleSection>
  );
}

// ============================================================================
// AUDIENCES + WATERFALL
// ============================================================================
function AudiencesAndWaterfall({ waterfall, setWaterfall }) {
  const isCustom = waterfall.length !== DEFAULT_WATERFALL.length || waterfall.some((x, i) => x !== DEFAULT_WATERFALL[i]);
  const moveUp = (i) => { if (i === 0) return; const n = [...waterfall]; [n[i-1], n[i]] = [n[i], n[i-1]]; setWaterfall(n); };
  const moveDown = (i) => { if (i === waterfall.length-1) return; const n = [...waterfall]; [n[i+1], n[i]] = [n[i], n[i+1]]; setWaterfall(n); };
  const reset = () => setWaterfall(DEFAULT_WATERFALL);
  return (
    <CollapsibleSection
      title="Audiences & Waterfall"
      info="The audiences feeding this campaign and the identifier-resolution waterfall used to assign each member a ZID. The waterfall is captured at audience upload time and can be re-ordered here for the current attribution run without changing the audience itself."
      badges={isCustom ? <Pill tone="warning">Custom override</Pill> : <Pill>Original</Pill>}
    >
      <div className="grid aud-wf">
        <Card title="Audiences attached to this campaign">
          <Tbl
            headers={["Audience", "Source", "Size", "Lineage", "Waterfall (original)"]}
            rowTone={AUDIENCES.map(a => a.lineage_present ? "success" : undefined)}
            rows={AUDIENCES.map(a => [a.name, a.source, a.size, a.lineage_present ? "Yes (customer-ID reporting available)" : "No (Zeta-native)", a.waterfall_config_id])}
          />
        </Card>
        <Card title="Waterfall (used for ZID resolution)">
          <div className="col" style={{ gap: 10 }}>
            <div className="t-small t-sec">
              Reorder for this attribution run. The original captured at audience upload time was <span className="t-semi">{DEFAULT_WATERFALL.join(" → ")}</span>.
            </div>
            <div>
              {waterfall.map((id, i) => (
                <div className="wf-row" key={id}>
                  <div className="wf-index">{i+1}</div>
                  <div className="t-semi">{ID_TYPE_LABEL[id] || id}</div>
                  <div className="t-ter t-small t-mono">{id}</div>
                  <div className="spacer"></div>
                  <button className="icon-btn" title="Move up"   onClick={() => moveUp(i)}   disabled={i===0}>↑</button>
                  <button className="icon-btn" title="Move down" onClick={() => moveDown(i)} disabled={i===waterfall.length-1}>↓</button>
                </div>
              ))}
            </div>
            {isCustom ? (
              <div className="row" style={{ marginTop: 4 }}>
                <button className="btn secondary" onClick={reset}>Reset to original</button>
                <button className="btn">Save as new account default</button>
              </div>
            ) : (
              <div className="t-small t-ter">
                Tip: reordering applies the new waterfall to MTA only. Incrementality always uses the original waterfall.
              </div>
            )}
          </div>
        </Card>
      </div>
    </CollapsibleSection>
  );
}

function DataInspector() {
  const [tab, setTab] = useState("exposures");
  const [qi, setQi] = useState(0);
  return (
    <div className="section">
      <div className="row">
        <h2 style={{ margin: 0, fontSize: 16 }}>Data Inspector</h2>
        <Pill tone="info">sample data + 11 queries</Pill>
        <div className="spacer"></div>
        <span className="t-small t-sec">
          The fabric stores feeding everything above. Each tab includes a one-sentence note on what the data is used for.
        </span>
      </div>
      <Card>
        <div className="tabs">
          {DATA_TABS.map(t => <Pill key={t.value} active={tab===t.value} onClick={() => setTab(t.value)}>{t.label}</Pill>)}
        </div>
        {tab === "exposures" && (
          <div className="col" style={{ gap: 6 }}>
            <div className="t-small t-sec">Used as the candidate touchpoint set the attribution engine matches conversions back to — every ad impression delivered for the campaign, served and ghost alike. The propensity columns are populated only for events from stratified-design experiments (ZX-style decile randomization). The <span className="t-mono">lineage_enrichment</span> column is stamped by EEL at ingest by reading from Lineage Logs for audiences built from customer-supplied IDs; once it's on the row, the attribution engine never needs to read Lineage Logs directly.</div>
            <Tbl
              headers={["event_id", "source", "subtype", "channel", "time", "arm", "audience", "original_identifiers", "resolved_zids", "propensity_score", "propensity_model", "lineage_enrichment"]}
              columnAlign={["left","left","left","left","left","left","left","left","left","right","left","left"]}
              rows={EEL_EXPOSURES.map(e => [
                e.event_id, e.source_system, e.event_subtype, e.channel,
                e.event_time.slice(5, 16).replace("T", " "), e.exposure_arm,
                e.audience_id.replace("aud_", ""),
                e.original_identifiers.map(i => `${i.type}/${i.value}`).join(", "),
                e.resolved_zids.map(z => z.is_placeholder ? `${z.zid} (placeholder)` : z.zid).join(", "),
                e.propensity_score == null ? "—" : e.propensity_score.toFixed(3),
                e.propensity_model_id ?? "—",
                e.lineage_enrichment
                  ? `${e.lineage_enrichment.original_identifier} · ${e.lineage_enrichment.mapping_path.join("→")} · ${e.lineage_enrichment.lineage_id}`
                  : "—",
              ])}
            />
          </div>
        )}
        {tab === "conversions" && (
          <div className="col" style={{ gap: 6 }}>
            <div className="t-small t-sec">Used as the outcomes the engine tries to credit back to exposures — every conversion in the attribution window, with its full identifier set preserved so the second pass and household projection can rescue ones the first pass misses.</div>
            <Tbl
              headers={["event_id", "source", "subtype", "time", "original_identifiers", "resolved_zids", "conversion_value"]}
              columnAlign={["left","left","left","left","left","left","right"]}
              rows={EEL_CONVERSIONS.map(c => [
                c.event_id, c.source_system, c.event_subtype,
                c.event_time.slice(5, 16).replace("T", " "),
                c.original_identifiers.map(i => `${i.type}/${i.value}`).join(", "),
                c.resolved_zids.map(z => z.is_placeholder ? `${z.zid} (placeholder)` : z.zid).join(", "),
                c.conversion_value ? fmtUsd(c.conversion_value) : "—",
              ])}
            />
          </div>
        )}
        {tab === "audience_lineage" && (
          <div className="col" style={{ gap: 6 }}>
            <div className="row" style={{ gap: 6 }}>
              <Pill tone="warning">For reference — not used by the attribution engine</Pill>
            </div>
            <div className="t-small t-sec">Source-of-truth for audience-level identifier mapping, owned by Lineage Logs. Consumed only by EEL at ingest time to stamp <span className="t-mono">lineage_enrichment</span> onto each exposure row (see EEL · Exposures). The attribution engine never reads or joins this table — every query above pulls original_identifier and mapping_path straight off the exposure. The five rows below seeded the enrichment for the past-guests-loyalty exposures in this campaign.</div>
            <Tbl
              headers={["lineage_id", "audience_id", "customer_supplied_id", "type", "mapping_path", "resolved_zids"]}
              rows={AUDIENCE_LINEAGE.map(l => [l.lineage_id, l.audience_id.replace("aud_",""), l.customer_supplied_id, l.customer_id_type, l.mapping_path.join(" / "), l.resolved_zids.join(", ")])}
            />
          </div>
        )}
        {tab === "identity_events" && (
          <div className="col" style={{ gap: 6 }}>
            <div className="t-small t-sec">Emitted by People Service (inside ZMP) every time a profile's identifier set changes, and ingested into EEL like any other event. The latest event per (bsin, identifier) as of conversion time gives the BSIN's claimed ZID set — replacing the separate ZMP-profile-lineage SCD2 store with a derived projection of this stream.</div>
            <Tbl
              headers={["event_id", "subtype", "time", "bsin", "identifier", "resolved_zids"]}
              rows={IDENTITY_EVENTS.map(i => [
                i.event_id,
                i.event_subtype,
                i.event_time.slice(5, 16).replace("T", " "),
                i.bsin,
                `${i.identifier.type}/${i.identifier.value}`,
                i.resolved_zids.join(", "),
              ])}
            />
          </div>
        )}
        {tab === "transition_logs" && (
          <div className="col" style={{ gap: 6 }}>
            <div className="t-small t-sec">Used by the second-pass match — when a conversion lands on a ZID that didn't exist (or had no exposures) at exposure time, the engine looks up the stale-ZID rows whose <span className="t-mono">currentZid</span> matches the conversion's ZID to recover the predecessor IDs. Production stores this as an aggregated <span className="t-mono">ZidTransitionMapping</span>: chains are collapsed at write time so a single hop returns the final answer (no recursion needed); <span className="t-mono">staleDate</span> is set once when each <span className="t-mono">zid</span> first goes stale and never refreshed; rows have a finite TTL.</div>
            <Tbl
              headers={["zid (stale)", "currentZid", "staleDate"]}
              rows={TRANSITION_LOGS.map(t => [t.zid, t.currentZid, t.staleDate])}
            />
          </div>
        )}
        {tab === "queries" && (
          <div className="col" style={{ gap: 6 }}>
            <div className="t-small t-sec">Used to compose attribution end-to-end against the fabric — these are the joins each attribution service runs (or generates) for any campaign.</div>
            <div className="grid queries" style={{ gap: 16 }}>
              <div className="col" style={{ gap: 6 }}>
                {QUERIES.map((q, i) => (
                  <Pill key={q.name} active={i===qi} onClick={() => setQi(i)}>{q.name}</Pill>
                ))}
              </div>
              <Card title={QUERIES[qi].name}>
                <div className="col" style={{ gap: 10 }}>
                  <div className="t-sec">{QUERIES[qi].description}</div>
                  <pre className="sql">{QUERIES[qi].sql}</pre>
                </div>
              </Card>
            </div>
          </div>
        )}
      </Card>
    </div>
  );
}

function App() {
  const [model, setModel]       = useState("last_touch");
  const [grouping, setGrouping] = useState("zid");
  const [hhTypes, setHhTypes]   = useState(["ip", "ctv", "pa"]);
  const [viewMode, setViewMode] = useState("both");
  const [waterfall, setWaterfall] = useState(DEFAULT_WATERFALL);
  const [collapseBroadcast, setCollapseBroadcast] = useState(null);
  const expandAll   = () => setCollapseBroadcast({ open: true,  key: Date.now() });
  const collapseAll = () => setCollapseBroadcast({ open: false, key: Date.now() });

  const credKey = modelKey(model);
  const channelData = CHANNELS.map(c => ({
    name: c.name,
    credited: c[credKey],
    incremental: c.incremental_conversions,
    spend: c.spend,
    impressions: c.impressions,
  }));
  const insights = athenaInsights(model, grouping, viewMode);

  return (
    <main className="main">
      <CollapseBroadcastContext.Provider value={collapseBroadcast}>
        <TopBar />
        <div className="t-sec" style={{ marginTop: -10, marginBottom: 20 }}>
          {ACCOUNT} · <span className="t-semi">{CAMPAIGN.name}</span> · {CAMPAIGN.window}
        </div>

        <div className="col" style={{ gap: 20 }}>
          <Controls model={model} setModel={setModel}
            grouping={grouping} setGrouping={setGrouping}
            hhTypes={hhTypes} setHhTypes={setHhTypes}
            viewMode={viewMode} setViewMode={setViewMode} />
          <KpiStrip viewMode={viewMode} />
          <Diagnostics grouping={grouping} />
          <div className="row" style={{ gap: 6, marginBottom: -8 }}>
            <span className="t-small t-sec">All sections:</span>
            <Pill onClick={expandAll}>Expand all</Pill>
            <Pill onClick={collapseAll}>Collapse all</Pill>
          </div>
          <AthenaCard insights={insights} />
          {(viewMode === "mta" || viewMode === "both") && (
            <MtaSection model={model} channelData={channelData} grouping={grouping} />
          )}
          {(viewMode === "inc" || viewMode === "both") && (
            <IncrementalitySection channelData={channelData} />
          )}
          {(viewMode === "inc" || viewMode === "both") && (
            <StratifiedDesignSection />
          )}
          {viewMode === "both" && (
            <ModelVsCausality channelData={channelData} />
          )}
          <AudiencesAndWaterfall waterfall={waterfall} setWaterfall={setWaterfall} />
          <DataInspector />
          <FeatureEnhancementsSection />
        </div>
      </CollapseBroadcastContext.Provider>
    </main>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  componentDidCatch(err, info) { console.error("React render error:", err, info); }
  render() {
    if (this.state.err) {
      return <div style={{ padding: 24, background: "#fee2e2", color: "#991b1b", border: "1px solid #fecaca", borderRadius: 8, margin: 24 }}>
        <div style={{ fontWeight: 700, marginBottom: 8 }}>App render error</div>
        <pre style={{ whiteSpace: "pre-wrap", margin: 0 }}>{String(this.state.err && this.state.err.stack || this.state.err)}</pre>
      </div>;
    }
    return this.props.children;
  }
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App /></ErrorBoundary>);
} catch (err) {
  const el = document.getElementById("boot-error");
  el.style.display = "block";
  el.textContent = "App boot error: " + (err && err.message || err);
  console.error(err);
}
</script>
</body>
